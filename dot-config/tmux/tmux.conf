# Reorginze tmux.conf and add new plugins
# -- Louis 2026/0331
# ------ System Settings ------
set -g mode-keys vi
set -g set-clipboard on     # Use system clipboard
set -g default-terminal "screen-256color-italic"		# Customized terminfo supporting italic style

# Set window/session/pane index starting from 1
set -g base-index 1
setw -g pane-base-index 1

set -g mouse on
set -g renumber-windows on
set -g extended-keys on

# Add length of status-right -- Louis 2022/0912
set -g status-right-length 60
set -g status-left-length 20

# ------ Keybindings ------
unbind-key C-b
set -g prefix C-Space				# Remap prefix-key to Ctrl-space

# Work on pane split and current path movement
bind-key | split-window -hc "#{pane_current_path}"
bind-key - split-window -vc "#{pane_current_path}"

bind-key c new-window -c "#{pane_current_path}"			# Create new window with current path

unbind-key r
bind-key r source-file $XDG_CONFIG_HOME/tmux/tmux.conf\; display "Reloaded!"

bind-key S set-window-option synchronize-panes			# Synchronize-panes -- Louis 2022/0207

# Remap copy/paste to VI mode
unbind-key [
bind-key Escape copy-mode

# Remap session switching
unbind-key (
unbind-key )
bind-key [ switchc -n 
bind-key ] switchc -p 

# Simplify vi-style copy-paste
# Reference: https://dev.to/iggredible/the-easy-way-to-copy-text-in-tmux-319g 
# -- Louis 2024/0312
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ------- Others ------
# For 'yazi' image preview
# https://yazi-rs.github.io/docs/image-preview#tmux
# -- Louis 2024/0531
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Added based on LazyVim suggestion -- Louis 2024/0307
set -sg escape-time 10
set -g focus-events on

# ------- TPM & Plugins ------
# Install tpm if it's not there -- Louis 2022/0912
if "test ! -d $XDG_CONFIG_HOME/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/tmux/plugins/tpm && $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins'"

# Plugins/TPMl and related configs
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'Morantron/tmux-fingers'							# Prefix-F to show selections
set -g @fingers-hint-style "bg=colour110,fg=black,bold"
set -g @fingers-highlight-style "fg=colour214,italics"
set -g @fingers-pattern-0 '([0-9a-fA-F]{2}[:-]){5}([0-9a-fA-F]{2})'			# Pattern for MAC address
set -g @fingers-show-copied-notification 1

set -g @plugin 'louis-hsu/tmux-floatx'
set -g @floatx-launch-1 'key=g,cmd=lazygit'					# Launch 'lazygit' in float window
# set -g @floatx-debug 'on'

set -g @plugin 'jaclu/tmux-menus'										# Prefix-\ to show menu

set -g @plugin 'louis-hsu/nord-tmux'
set -g @nord_tmux_status_extra_line 1

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'

run -b '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'

