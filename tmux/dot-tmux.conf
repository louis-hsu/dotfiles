# Set left-shift (mapping to Home key with single press) as prefix key
# set -g prefix Home
# unbind C-b
# bind-key Home send-prefix
#
# Change Home to End since mis-touch left-S too much... -- Louis 2022/0126
#set -g prefix End
#unbind C-b
#bind-key End send-prefix
#
# Should be final change:
# 1. Change prefix to Alt/Option+b (Ctrl-b conflicts with Vim)
# 2. Utilize Karabiner-Element to setup letf-Shift as M-b
# -- Louis 2023/1226
unbind C-b
set-option -g prefix M-b

setw -g mode-keys vi

set-environment -g 'IGNOREEOF' 2 

# Set base index from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g mouse on
set-option -g renumber-windows on

# Add length of status-right -- Louis 2022/0912
set -g status-right-length 60
set -g status-left-length 20
# Fix vim-airline theme color issue in tmux -- Louis 2021/0521
#set-window-option -g utf8 on
#set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"

# Work on pane split and movement
bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf\; display "Reloaded!"

# For synchronize-panes -- Louis 2022/0207
bind S set-window-option synchronize-panes

# Remap copy/paste to VI mode
unbind-key [
bind-key Escape copy-mode

# Remap session switching and define popup session -- Louis 2022/0916
unbind-key (
unbind-key )
bind [ switchc -n 
bind ] switchc -p 

#bind P display-popup -h 80% -w 80% -E "tmux new-session -A -s floating"
bind P run-shell "tmuxfloat"

bind-key -Tcopy-mode-vi v send -X begin-selection
if-shell 'case "`uname`" in *Linux*) true;; *) false;; esac' \
    'bind-key -Tcopy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection primary -i -f | xclip -selection clipboard -i"' \
    'bind-key -Tcopy-mode-vi Enter send -X copy-pipe-and-cancel  "reattach-to-user-namespace pbcopy"'
if-shell 'case "`uname`" in *Linux*) true;; *) false;; esac' \
    'bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection primary -i -f | xclip -selection clipboard -i"' \
    'bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel  "reattach-to-user-namespace pbcopy"'

#setw -g window-style 'bg=#282a2e'
#setw -g window-active-style 'bg=#1d1f21'

# Install tpm if it's not there -- Louis 2022/0912
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins -- Louis 2019/1123
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'o0th/tmux-nova'
# tmux-prefix-highlight is not compatible with tmux-nova
# and follow the suggestion from nova owner (https://github.com/o0th/tmux-nova/issues/33)
# -- Louis 2023/0417
#set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Add tmux-prefix-highlight -- Louis 2022/0912

# Configure nova theme -- Louis 2023/0412
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
#set -g @nova-nerdfonts-right 

#set -g @nova-nerdfonts-right 

set -g @nova-pane-active-border-style "#50fa7b"

set -g @nova-segment-mode "#{?client_prefix,Ω,ω}"
set -g @nova-segment-mode-colors "#50fa7b #282a36"
set -g @nova-segment-whoami-colors "#50fa7b #282a36"
set -g @nova-pane "#I#{?pane_in_mode,  #{pane_mode},}  #W"
set -g @nova-segment-action-prefix "#{?client_prefix,Wait,#{?#{==:#{pane_mode},copy-mode},Copy,}#{?#{==:#{pane_mode},view-mode},View,}#{?synchronize-panes,Sync,}}"
set -g @nova-segment-action-prefix-style "bold italic"
set -g @nova-segment-action-prefix-colors "colour214 black"
  
set -g @nova-segment-novatime "%Y-%m-%d %H:%M"
#set -g @nova-segment-actionprefix "#{prefix_highlight}"

set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "action-prefix novatime whoami"

#set -g @prefix_highlight_show_copy_mode 'on'
#set -g @prefix_highlight_show_sync_mode 'on'
#set -g @prefix_highlight_prefix_prompt 'Wait'
#set -g @prefix_highlight_copy_prompt 'Copy'
#set -g @prefix_highlight_sync_prompt 'Sync'

# Initialize tmux plugin manager (keep this line at the very bottom of tmux.conf) -- Louis 2019/1123
run -b '~/.tmux/plugins/tpm/tpm'
